{% extends "./components/base.html" %}

{% block title %} Logowanie {% endblock %}

{% block content %}
<div class="glass-panel panel-auth">
    <h2>Witaj ponownie</h2>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Twój login" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Hasło" required>
        </div>
        <button type="submit">Zaloguj się</button>
    </form>

    <div id="msg" class="msg" style="margin-top: 20px;"></div>

    <div class="auth-footer">
        <a href="/register">Nie masz konta? Zarejestruj się!</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgElement = document.getElementById("msg");
    msgElement.className = "msg";
    msgElement.innerText = "Chwileczkę...";

    const formData = new URLSearchParams();
    formData.append("username", document.getElementById("username").value);
    formData.append("password", document.getElementById("password").value);

    try {
        const res = await fetch("/login", {
            method: "POST",
            body: formData,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        const data = await res.json();

        if (res.ok && data.access_token) {
            localStorage.setItem("token", data.access_token);
            msgElement.className = "msg msg-success";
            msgElement.innerText = "Zalogowano! Przekierowanie...";
            setTimeout(() => { window.location.href = "/"; }, 800);
        } else {
            msgElement.className = "msg msg-error";
            msgElement.innerText = data.detail || "Błędny login lub hasło.";
        }
    } catch (error) {
        msgElement.className = "msg msg-error";
        msgElement.innerText = "Brak połączenia z serwerem...";
    }
});
</script>
{% endblock %}

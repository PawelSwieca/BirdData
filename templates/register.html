{% extends "./components/base.html" %}

{% block title %} Rejestracja {% endblock %}

{% block content %}
<div class="glass-panel panel-auth">
    <h2>Dołącz do nas </h2>

    <form id="registerForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Twój login (min. 3 znaki)" required>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Twój e-mail" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Hasło (min. 6 znaków)" required>
        </div>
        <button type="submit">Zarejestruj się </button>
    </form>

    <div id="msg" class="msg" style="margin-top: 20px;"></div>

    <div class="auth-footer">
        <a href="/login">Masz już konto? Zaloguj się!</a>
    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msgElement = document.getElementById("msg");
    msgElement.className = "msg";
    msgElement.innerText = "Tworzenie konta...";

    const formData = new URLSearchParams();
    formData.append("username", document.getElementById("username").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);

    try {
        const res = await fetch("/register", {
            method: "POST",
            body: formData,
            headers: { "Content-Type": "application/x-www-form-urlencoded" }
        });
        const data = await res.json();

        if (res.ok && data.access_token) {
            localStorage.setItem("token", data.access_token);
            msgElement.className = "msg msg-success";
            msgElement.innerText = "Zarejestrowano pomyślnie! Logowanie...";
            setTimeout(() => { window.location.href = "/"; }, 1200);
        } else {
            msgElement.className = "msg msg-error";
            msgElement.innerText = data.detail || "Błąd rejestracji. Sprawdź dane.";
        }
    } catch (error) {
        msgElement.className = "msg msg-error";
        msgElement.innerText = "Brak połączenia z serwerem...";
    }
});
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{{ tytul }}</title>
    <link rel="stylesheet" href="{{ url_for('style', path='style.css') }}?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>{{ tytul }}</h1>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "/login";
        }
    </script>

    <button onclick="localStorage.removeItem('token'); window.location.href='/login';" class="btn-logout">
        Wyloguj się
    </button>

    {% if czy_zalogowany %}
    <p class="msg-admin">Witaj Administratorze! Masz pełen dostęp do danych.</p>
    {% else %}
    <p class="msg-guest">Zaloguj się, aby pobrać XML.</p>
    {% endif %}

    <h3>Dostępne lata do analizy:</h3>
    <ul>
        {% for rok in lata_badane %}
        <li>Rok pomiarowy: <b>{{ rok }}</b></li>
        {% endfor %}
    </ul>

    <div class="analysis-section">
        <h4>Eksplorator surowych danych API (Na żywo)</h4>
        <div class="input-container">
            <label class="input-label" for="input-rok">Wpisz rok badania:</label>
            <input class="input-field" type="number" id="input-rok" value="2022" min="2000" max="2024">
            <button class="bnt-search" onclick="pobierzPtakiZBackendu()">Szukaj w GBIF</button>
        </div>
    </div>

    <button onclick="uruchomIntegracje()" class="btn-integrate">
        Integruj dane (XML + REST) i zapisz do Bazy DB
    </button>

<div class="analysis-section">
        <label for="select-ptak" class="analysis-label">Wybierz gatunek do analizy korelacji:</label>

        <select id="select-ptak" class="analysis-select">
            <option value="Wróbel domowy">Wróbel domowy (Passer domesticus)</option>
            <option value="Kaczka krzyżówka">Kaczka krzyżówka (Anas platyrhynchos)</option>
            <option value="Gęś gęgawa">Gęś gęgawa (Anser anser)</option>
        </select>

        <button onclick="generujWykresAnalizy()" class="btn-generate">Generuj Wykres Liniowy 📊</button>
    </div>

    <div class="canvas-container">
        <canvas id="canvasWykresu" width="400" height="200"></canvas>
    </div>

    <hr>
    <div id="wynik-api"></div>
</div>

<script src="{{ url_for('static', path='script.js') }}?v=3"></script>
</body>
</html>

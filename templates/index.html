<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>{{ tytul }}</title>
    <link rel="stylesheet" href="{{ url_for('style', path='style.css') }}">
</head>
<body>

<div class="container">
    <h1>{{ tytul }}</h1>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "/login";
        }
    </script>

    <button onclick="localStorage.removeItem('token'); window.location.href='/login';">
        Wyloguj się
    </button>

    {% if czy_zalogowany %}
    <p style="color: green;">Witaj Administratorze! Masz pełen dostęp do danych.</p>
    {% else %}
    <p style="color: red;">Zaloguj się, aby pobrać XML.</p>
    {% endif %}

    <h3>Dostępne lata do analizy:</h3>
    <ul>
        {% for rok in lata_badane %}
        <li>Rok pomiarowy: <b>{{ rok }}</b></li>
        {% endfor %}
    </ul>

    <button onclick="pobierzPtakiZBackendu()">Pobierz próbkę ptaków z GBIF</button>

    <button onclick="uruchomIntegracje()">
        Integruj dane (XML + REST) i zapisz do Bazy DB
    </button>

    <button onclick="filtrujWybranePtaki()">Ilość kaczek w roku 2020?</button>

    <hr>
    <div id="wynik-api"></div>
</div>

<script src="{{ url_for('static', path='script.js') }}"></script>
</body>
</html>
